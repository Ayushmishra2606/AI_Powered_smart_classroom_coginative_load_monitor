<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — AI Smart Classroom</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:480px;">
    <div class="auth-logo">
      <div class="logo-icon">🧠</div>
      <h1>Create Account</h1>
      <p>Join the University Smart Classroom</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat, msg in messages %}<div class="flash-msg {{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
    {% endwith %}

    <!-- Role Selector -->
    <div class="role-pills" id="rolePills" style="display:flex;gap:8px;margin-bottom:18px;">
      <button type="button" class="role-pill active" onclick="selectRole('student',this)">🎓 Student</button>
      <button type="button" class="role-pill" onclick="selectRole('teacher',this)">👨‍🏫 Teacher</button>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="role" id="roleInput" value="student"/>
      <div class="form-group">
        <label>Full Name</label>
        <input class="form-control" type="text" name="name" placeholder="John Doe" required/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input class="form-control" type="email" name="email" placeholder="john@university.edu" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="Create password" required/>
      </div>
      <!-- Student-only fields -->
      <div id="studentFields">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label>Department</label>
            <select class="form-control" name="department_id">
              <option value="">Select dept</option>
              {% for d in departments %}
              <option value="{{ d.id }}">{{ d.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Semester</label>
            <select class="form-control" name="semester">
              {% for i in range(1,9) %}<option value="{{ i }}">Sem {{ i }}</option>{% endfor %}
            </select>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:14px;margin-top:4px;">
        Create Account →
      </button>
    </form>
    <div class="auth-link">Already registered? <a href="{{ url_for('auth.login') }}">Sign in</a></div>
  </div>
</div>
<style>
.role-pill { flex:1; padding:8px 4px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--glass-border); background:var(--glass); color:var(--text-secondary); transition:all 0.2s; }
.role-pill.active { background:linear-gradient(135deg,var(--accent-cyan),var(--accent-blue)); color:#fff; border-color:transparent; }
</style>
<script>
function selectRole(role, el) {
  document.querySelectorAll('.role-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('roleInput').value = role;
  document.getElementById('studentFields').style.display = (role === 'student') ? 'block' : 'none';
}
</script>
</body>
</html>
