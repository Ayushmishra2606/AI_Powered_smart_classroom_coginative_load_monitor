<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AI Smart Classroom</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🧠</div>
      <h1>AI Smart Classroom</h1>
      <p>Cognitive Load & Attention Monitor</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat, msg in messages %}
    <div class="flash-msg {{ cat }}">{{ msg }}</div>
    {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label>Email Address</label>
        <input class="form-control" type="email" name="email" placeholder="teacher@school.edu" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;margin-top:8px;font-size:14px;">
        Sign In →
      </button>
    </form>

    <div class="auth-link">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a>
    </div>
  </div>
</div>
</body>
</html>
